<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
</head>
<body style="margin:0; background:#050505; display:flex; flex-direction:column; justify-content:center; align-items:center; height:100vh; color:white; font-family:Arial; touch-action: none;">
    <div style="width:90%; max-width:400px; padding:10px; background:#111; border:2px solid #333; text-align:center; font-weight:bold; margin-bottom:10px; border-radius: 5px; font-size: 20px;">
        <span style="background: linear-gradient(90deg, #ff0000, #ff7f00, #ffff00, #00ff00, #0000ff, #4b0082, #9400d3); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">NINUR GAMES</span>
    </div>
    <div style="padding: 3px; background: linear-gradient(45deg, #ff0000, #ff7f00, #ffff00, #00ff00, #0000ff, #4b0082, #9400d3); border-radius: 8px;">
        <!-- เปลี่ยนขนาดเป็น 400 เพื่อให้ดูใหญ่ขึ้น -->
        <canvas id="gameCanvas" width="400" height="400" style="background:#050505; display:block; width:90vw; height:90vw; max-width:400px; max-height:400px;"></canvas>
    </div>
    <div id="status" style="margin-top:15px; text-align:center; color:#0ff; text-shadow: 0 0 10px #0ff;">
        <div id="scoreDisplay" style="font-size:20px;">TAP TO START</div>
        <div id="highScoreDisplay" style="font-size:14px; margin-top:5px;">Best: 0</div>
    </div>
    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const gridSize = 20;
        const tileCount = 20; // 400 / 20 = 20
        let snake = [{x: 10, y: 10}, {x: 9, y: 10}], food = {x: 5, y: 5}, dx = 1, dy = 0;
        let score = 0, speed = 150, gameOver = false, gameStarted = false;
        let hue = 0, foodHue = 0;
        let highScore = localStorage.getItem("ninurHighScore") || 0;
        document.getElementById("highScoreDisplay").innerText = "Best: " + highScore;
        
        let touchStartX = 0, touchStartY = 0;
        canvas.addEventListener('touchstart', e => {
            touchStartX = e.touches[0].clientX; touchStartY = e.touches[0].clientY;
            if (!gameStarted) { gameStarted = true; gameLoop(); }
            if (gameOver) location.reload();
        }, false);
        
        canvas.addEventListener('touchend', e => {
            let diffX = e.changedTouches[0].clientX - touchStartX;
            let diffY = e.changedTouches[0].clientY - touchStartY;
            if (Math.abs(diffX) > Math.abs(diffY)) {
                if (diffX > 0 && dx !== -1) { dx = 1; dy = 0; } else if (diffX < 0 && dx !== 1) { dx = -1; dy = 0; }
            } else {
                if (diffY > 0 && dy !== -1) { dx = 0; dy = 1; } else if (diffY < 0 && dy !== 1) { dx = 0; dy = -1; }
            }
        }, false);

        function gameLoop() {
            if (gameOver) return;
            let head = {x: snake[0].x + dx, y: snake[0].y + dy};
            if (head.x < 0 || head.x >= tileCount || head.y < 0 || head.y >= tileCount || snake.some(p => p.x === head.x && p.y === head.y)) {
                gameOver = true;
                if (score > highScore) { highScore = score; localStorage.setItem("ninurHighScore", highScore); document.getElementById("highScoreDisplay").innerText = "Best: " + highScore; }
                document.getElementById("scoreDisplay").innerText = "GAME OVER"; return;
            }
            snake.unshift(head);
            if (head.x === food.x && head.y === food.y) {
                score++; food = {x: Math.floor(Math.random() * tileCount), y: Math.floor(Math.random() * tileCount)};
                foodHue = Math.random() * 360; document.getElementById("scoreDisplay").innerText = "SCORE: " + score;
            } else { snake.pop(); }
            
            ctx.fillStyle = "#050505"; ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.shadowBlur = 15; ctx.shadowColor = `hsl(${foodHue}, 100%, 50%)`;
            ctx.fillStyle = `hsl(${foodHue}, 100%, 50%)`; ctx.fillRect(food.x * gridSize + 5, food.y * gridSize + 5, gridSize - 10, gridSize - 10);
            
            hue += 10;
            snake.forEach((p, i) => {
                ctx.shadowBlur = i === 0 ? 20 : 5;
                ctx.fillStyle = `hsl(${(hue + i * 20) % 360}, 100%, 50%)`;
                ctx.beginPath(); ctx.arc(p.x * gridSize + gridSize/2, p.y * gridSize + gridSize/2, gridSize/2 - 2, 0, Math.PI * 2); ctx.fill();
            });
            ctx.shadowBlur = 0;
            setTimeout(gameLoop, speed);
        }
    </script>
</body>
</html>
